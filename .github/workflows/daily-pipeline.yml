name: Daily Data Pipeline

on:
  schedule:
    # 00:15 Moscow time (UTC+3) = 21:15 UTC
    - cron: "15 21 * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install supabase requests apimoex python-dotenv pandas numpy openpyxl

      - name: Run incremental pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m data_pipeline.run_pipeline

      - name: Ping Streamlit app (keep alive)
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code}" \
            "https://moex-volume-analytics-cvssujr7yjomlejhacd5nn.streamlit.app/" \
            || true
