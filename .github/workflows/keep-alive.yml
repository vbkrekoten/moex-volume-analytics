name: Keep Streamlit Alive

on:
  schedule:
    # Ping every 12 hours to prevent Streamlit Community Cloud from sleeping
    - cron: "0 6,18 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Streamlit app
        run: |
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://moex-volume-analytics-cvssujr7yjomlejhacd5nn.streamlit.app/")
          echo "Streamlit responded with HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 500 ]; then
            echo "::warning::Streamlit returned $HTTP_CODE"
          fi
